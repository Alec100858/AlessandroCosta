<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wiser Log — Módulo de Devolução</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;background:#f0f2f5}
.hdr{height:46px;background:linear-gradient(90deg,#0057b8 60%,#1a9fd4);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.18)}
.hdr-logo{color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px}
.hdr-logo span{background:#fff;color:#0057b8;font-size:9px;font-weight:700;padding:1px 4px;border-radius:2px}
.hdr-sep{color:rgba(255,255,255,.25);margin:0 4px}
.hdr-mod{color:rgba(255,255,255,.85);font-size:11px;font-weight:600}
.hdr-right{margin-left:auto;color:#fff;font-size:10px;display:flex;align-items:center;gap:8px}
.hdr-av{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#42a5f5,#26c281);border:2px solid rgba(255,255,255,.35);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff}
.body{display:flex;flex:1;overflow:hidden}
.sb{width:56px;background:#fff;border-right:1px solid #e4e6ea;display:flex;flex-direction:column;align-items:center;padding:10px 0;gap:4px;flex-shrink:0}
.sb-btn{width:44px;height:48px;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border:none;background:none;gap:3px;transition:background .15s;flex-shrink:0}
.sb-btn:hover{background:#f0f7ff}
.sb-btn.active{background:#e8f0fe}
.sb-icon{font-size:20px;color:#aaa;line-height:1}
.sb-btn.active .sb-icon{color:#0057b8}
.sb-lbl{font-size:7px;color:#bbb;text-align:center;line-height:1.2}
.sb-btn.active .sb-lbl{color:#0057b8;font-weight:700}
.frames{flex:1;position:relative}
iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;display:none}
iframe.active{display:block}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-logo"><span>W/</span>WISER LOG</div>
  <span class="hdr-sep">|</span>
  <span class="hdr-mod" id="hdr-mod">Gerenciador de Devolução</span>
  <div class="hdr-right"><div class="hdr-av">AS</div><span>Nespresso – Alessandro Silveira</span></div>
</div>
<div class="body">
  <div class="sb">
    <button class="sb-btn active" id="sb-ger" onclick="go('ger')" title="Gerenciador de Devolução"><span class="sb-icon">⊞</span><span class="sb-lbl">Gerenc.</span></button>
    <button class="sb-btn" id="sb-rem" onclick="go('rem')" title="Remanejamento Devolução"><span class="sb-icon">⇄</span><span class="sb-lbl">Remanej.</span></button>
    <button class="sb-btn" id="sb-tri" onclick="go('tri')" title="Triagem de Devolução"><span class="sb-icon">⚙</span><span class="sb-lbl">Triagem</span></button>
    <button class="sb-btn" id="sb-caixas" onclick="go('caixas')" title="Gestão de Caixas"><span class="sb-icon">📦</span><span class="sb-lbl">Caixas</span></button>
  </div>
  <div class="frames">
    <iframe id="fr-ger" class="active"></iframe>
    <iframe id="fr-rem"></iframe>
    <iframe id="fr-tri"></iframe>
    <iframe id="fr-caixas"></iframe>
  </div>
</div>
<template id="tpl-ger">
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Wiser Log — Gerenciador de Devolução</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;font-size:12px;background:#f0f2f5;overflow-x:hidden}



.hdr-logo span{background:#fff;color:#0057b8;font-size:9px;font-weight:700;padding:1px 4px;border-radius:2px}







.sb-btn:hover,

.main{padding:18px;background:#f0f2f5;min-height:calc(100vh - 46px);}
.page{display:none}.page.active{display:block}
.bread{font-size:10px;color:#aaa;margin-bottom:6px}
.bread a{color:#0057b8;cursor:pointer;text-decoration:none}
.page-title{font-size:13px;font-weight:700;color:#222;margin-bottom:14px;display:flex;align-items:center;gap:10px}

.card{background:#fff;border-radius:6px;box-shadow:0 1px 4px rgba(0,0,0,.07);padding:18px;margin-bottom:14px;max-width:100%}

/* PAINEL */
.panel-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px;max-width:100%}
.pc{background:#fff;border-radius:6px;padding:16px 14px;cursor:pointer;border:2px solid transparent;transition:all .15s;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.pc:hover{box-shadow:0 3px 10px rgba(0,0,0,.1)}
.pc.active{box-shadow:0 3px 10px rgba(0,0,0,.12)}
.pc .n{font-size:30px;font-weight:700;line-height:1.1}
.pc .l{font-size:9px;color:#777;margin-top:6px;line-height:1.5}
.pc-1 .n{color:#1565c0}.pc-1.active{border-color:#1565c0;background:#e8f0fe}
.pc-2 .n{color:#bf360c}.pc-2.active{border-color:#bf360c;background:#fbe9e7}
.pc-3 .n{color:#1b5e20}.pc-3.active{border-color:#1b5e20;background:#e8f5e9}
.pc-4 .n{color:#c62828}.pc-4.active{border-color:#c62828;background:#ffebee}

/* FILTROS */
.filters{display:flex;gap:7px;align-items:center;flex-wrap:wrap;padding:12px 0;border-bottom:1px solid #f0f0f0;margin-bottom:14px}
select,input[type=text],input[type=date],input[type=number]{font-size:10px;padding:4px 8px;border:1px solid #d8dde6;border-radius:4px;background:#fff;color:#333;height:28px;font-family:Arial;transition:border .15s}
select:focus,input:focus{outline:none;border-color:#0057b8}

/* BOTÕES */
.btn{border:none;border-radius:4px;padding:4px 14px;font-size:10px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:5px;height:28px;font-family:Arial;transition:all .15s}
.bb{background:#0057b8;color:#fff}.bb:hover{background:#004494}
.bg{background:#757575;color:#fff}
.br{background:#c62828;color:#fff}
.bk{background:#1b5e20;color:#fff}.bk:hover{background:#154d19}
.bo{background:#fff;color:#0057b8;border:1px solid #0057b8}.bo:hover{background:#e8f0fe}
.btn-sm{height:22px;padding:0 9px;font-size:9px}
.btn:disabled{background:#d0d0d0;color:#888;cursor:not-allowed;border-color:#d0d0d0}

/* TABELA GERENCIADOR */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:10px}
th{background:#f8f9fa;padding:8px 10px;text-align:left;font-weight:700;color:#555;border-bottom:2px solid #e4e6ea;white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid #f0f2f5;color:#333;vertical-align:middle;white-space:nowrap}
tr:hover td{background:#fafbfc}
input[type=checkbox]{width:12px;height:12px;accent-color:#0057b8;cursor:pointer}
.lnk{color:#0057b8;cursor:pointer;font-weight:600}.lnk:hover{text-decoration:underline}

/* BADGES */
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:9px;font-weight:700;white-space:nowrap}
.b-blue{background:#e8f0fe;color:#1565c0}
.b-red{background:#fbe9e7;color:#bf360c}
.b-green{background:#e8f5e9;color:#1b5e20}
.b-warn{background:#ffebee;color:#c62828;border:1px solid #ef9a9a}
.b-teal{background:#e0f2f1;color:#004d40}
.b-orange{background:#fff3e0;color:#e65100}

/* FORM NR */
.form-wrap{max-width:960px;width:100%;box-sizing:border-box}
.form-wrap .card{overflow-x:auto}

/* CHECKBOX INSUCESSO */
.insucesso-bar{display:flex;align-items:center;gap:10px;padding:11px 16px;background:#e8f0fe;border:1px solid #c5d8f5;border-radius:5px;margin-bottom:18px;cursor:pointer;user-select:none}
.insucesso-bar label{font-size:11px;font-weight:700;color:#1565c0;cursor:pointer}
.insucesso-bar .hint-ins{font-size:10px;color:#5c7fb8;margin-left:4px;font-style:italic}
.chk-ins{width:15px;height:15px;accent-color:#0057b8;cursor:pointer;flex-shrink:0}

/* SEÇÕES DO FORM */
.form-sec{margin-bottom:18px}
.form-sec-title{font-size:10px;font-weight:700;color:#0057b8;text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #dde8f8}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px}
.g5{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr;gap:14px}
.f-item{display:flex;flex-direction:column;gap:4px}
label.fl{font-size:10px;color:#555;font-weight:700}
.req{color:#c62828;margin-left:2px}
.opt{color:#aaa;font-weight:400;font-size:9px;margin-left:3px}
.hint{font-size:9px;color:#888;margin-top:2px;font-style:italic}
.f-disabled{background:#f5f5f5;color:#999;cursor:not-allowed}
.info-box{background:#e8f0fe;border-left:3px solid #0057b8;padding:10px 14px;border-radius:0 4px 4px 0;font-size:10px;color:#1565c0;margin-bottom:16px;line-height:1.6}
.warn-box{background:#fff8e1;border-left:3px solid #f9a825;padding:10px 14px;border-radius:0 4px 4px 0;font-size:10px;color:#e65100;margin-bottom:16px;line-height:1.6}

/* REPLICAR BTN */
.replicar-row{display:flex;align-items:flex-end;gap:8px}
.replicar-row .f-item{flex:1}

/* ITENS TABLE */
.items-wrap{border:1px solid #e4e6ea;border-radius:5px;overflow:hidden;margin-top:8px}
.items-wrap .tbl-scroll{overflow-x:auto;width:100%}
.items-tbl{width:100%;border-collapse:collapse;font-size:10px}
.items-tbl th{background:#f8f9fa;padding:7px 10px;text-align:left;font-weight:700;color:#555;border-bottom:1px solid #e4e6ea}
.items-tbl td{padding:7px 10px;border-bottom:1px solid #f5f5f5;vertical-align:middle}
.items-tbl tr:last-child td{border-bottom:none}
.items-tbl tr:hover td{background:#fafafa}
.items-tbl input[type=text]{width:100%;border:1px solid #d8dde6;border-radius:3px;padding:3px 6px;height:22px;font-size:10px}
.items-tbl input[type=number]{width:70px;border:1px solid #d8dde6;border-radius:3px;padding:3px 6px;height:22px;font-size:10px}
.add-item-row{padding:8px 10px;background:#f8f9fa;border-top:1px solid #e4e6ea;display:flex;gap:8px;align-items:center}
.add-item-row input{flex:1;font-size:10px;padding:4px 8px;border:1px solid #d8dde6;border-radius:4px;height:26px}

/* DIV CHECKBOX */
.div-wrap{display:flex;flex-direction:column;gap:3px;font-size:10px;color:#555}
.div-wrap-row{display:flex;align-items:center;gap:5px;}
textarea.obs-ta{width:100%;border:1px solid #d8dde6;border-radius:3px;padding:4px 6px;font-size:9px;font-family:Arial;resize:none;height:38px;margin-top:3px}

/* FORM ACTIONS */
.form-actions{display:flex;justify-content:flex-end;gap:8px;padding-top:16px;border-top:1px solid #f0f0f0;margin-top:4px}

/* MODAIS */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(2px)}
.overlay.show{display:flex}
.modal{background:#fff;border-radius:6px;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.22)}
.mw400{width:440px}.mw560{width:560px}
.mh{background:linear-gradient(90deg,#0057b8,#1a9fd4);padding:11px 18px;color:#fff;font-size:12px;font-weight:700;display:flex;justify-content:space-between;align-items:center}
.mh-x{cursor:pointer;opacity:.75;font-size:16px;background:none;border:none;color:#fff;line-height:1;padding:0}
.mb{padding:20px}
.mf{padding:11px 20px;border-top:1px solid #eee;display:flex;justify-content:flex-end;gap:8px;background:#fafafa}
.ok-icon{width:52px;height:52px;border-radius:50%;border:3px solid #1b5e20;display:flex;align-items:center;justify-content:center;margin:10px auto 14px;color:#1b5e20;font-size:24px;font-weight:700}

/* ETIQUETA */
.etq-preview{border:2px solid #222;padding:10px 12px;display:inline-block;min-width:220px;font-family:monospace;background:#fff;margin-top:10px}
.etq-bc{font-size:32px;letter-spacing:-3px;display:block;margin:4px 0;color:#111}
.etq-nr{font-size:15px;font-weight:700;color:#111}
.etq-info{font-size:10px;color:#555;margin-top:3px}

/* GESTÃO DE TRIAGEM */
.sug-box{background:#e3f2fd;border-left:2px solid #1976d2;padding:4px 8px;margin-top:4px;font-size:9px;color:#0d47a1;border-radius:0 3px 3px 0}

.footer{text-align:center;font-size:10px;color:#bbb;padding:14px;margin-top:4px}
tr.div-row td:first-child{border-left:4px solid #c62828;}
tr.div-row{background:#fff8f8;}
tr.div-row:hover td{background:#fff0f0;}
</style>
</head>
<body>





<div class="main">

  <!-- GERENCIADOR -->
  <div class="page active" id="page-ger">
    <div class="bread">Home / <a onclick="nav('ger')">Gerenciador de Devolução</a></div>
    <div class="page-title">
      GERENCIADOR DE DEVOLUÇÃO
      <button class="btn bb" style="margin-left:auto" onclick="nav('nr')">+ Criar NR</button>
    </div>

    <div class="panel-grid">
      <div class="pc pc-1 active" id="pc-env" onclick="filtrar('env')">
        <div class="n" id="cnt-env">5</div>
        <div class="l">NFs aguardando<br>envio ao cliente</div>
      </div>
      <div class="pc pc-2" id="pc-lib" onclick="filtrar('lib')">
        <div class="n" id="cnt-lib">4</div>
        <div class="l">NFs aguardando<br>liberação triagem</div>
      </div>
      <div class="pc pc-3" id="pc-tri" onclick="filtrar('tri')">
        <div class="n" id="cnt-tri">2</div>
        <div class="l">NFs aguardando<br>triagem</div>
      </div>
      <div class="pc pc-4" id="pc-div" onclick="filtrar('div')">
        <div class="n" id="cnt-div">2</div>
        <div class="l">NFs com itens<br>divergentes</div>
      </div>
    </div>

    <div class="card">
      <div class="filters">
        <select id="f-status" onchange="onFStatus()" style="width:200px">
          <option value="env">Aguardando envio ao cliente</option>
          <option value="lib">Aguardando liberação triagem</option>
          <option value="tri">Aguardando triagem</option>
          <option value="div">Com itens divergentes</option>
        </select>
        <input type="text" placeholder="Nº NR ou NF" style="width:115px"/>
        <input type="text" placeholder="CNPJ / CPF" style="width:125px"/>
        <input type="text" placeholder="Código NN" style="width:95px"/>
        <input type="date" style="width:115px"/>
        <input type="date" style="width:115px"/>
        <button class="btn bb">🔍 Filtrar</button>
        <button class="btn bo">Limpar</button>
      </div>

      <div style="display:flex;justify-content:flex-end;gap:8px;margin-bottom:12px">
        <button class="btn bk" id="btn-csv" style="display:none" onclick="openCSV()">⬇ Gerar CSV</button>
        <button class="btn bo" id="btn-etq-lote" style="display:none" onclick="openEtiquetaLote()">🖨 Imprimir Etiquetas</button>
        <button class="btn bb" id="btn-lib" style="display:none" onclick="openLiberar()">▶ Liberar para Triagem</button>
      </div>

      <div class="tbl-wrap">
        <table><thead><tr id="thead"></tr></thead><tbody id="tbody"></tbody></table>
      </div>
    </div>
    <div class="footer">2022 – 2026 © Wiser Log –</div>
  </div>

  <!-- CRIAR NR -->
  <div class="page" id="page-nr">
    <div class="bread" style="display:flex;align-items:center;gap:8px"><button class="btn bg btn-sm back-btn" onclick="_goBack()" style="display:none">← Voltar</button><span>Home / <a onclick="nav('ger')">Gerenciador de Devolução</a> / Criar NR</span></div>
    <div class="page-title">CRIAR NR — RECEBIMENTO DE DEVOLUÇÃO</div>

    <div class="form-wrap">

      <!-- CHECKBOX INSUCESSO -->
      <div class="insucesso-bar" onclick="toggleInsucesso()">
        <input type="checkbox" class="chk-ins" id="chk-ins" onclick="event.stopPropagation();toggleInsucesso()" />
        <label for="chk-ins">Insucesso de entrega</label>
        <span class="hint-ins" id="ins-hint">Marque para replicar automaticamente uma nota fiscal de venda existente</span>
      </div>

      <!-- CABEÇALHO DA NR -->
      <div class="card" style="padding:16px">
        <div class="form-sec">
          <div class="form-sec-title">Identificação da Nota Fiscal</div>
          <!-- Linha 1: NF + Série + Botão Replicar -->
          <div style="display:flex;gap:12px;align-items:flex-end;margin-bottom:14px">
            <div class="f-item" style="width:200px">
              <label class="fl">Número <span class="req">*</span></label>
              <input type="text" id="f-numero" placeholder="Número da NF" oninput="onNFInput()"/>
            </div>
            <div class="f-item" style="width:90px">
              <label class="fl">Série <span class="req">*</span></label>
              <input type="text" id="f-serie" placeholder="Série" onblur="validarNF()"/>
            </div>
            <div class="f-item" style="width:130px">
              <label class="fl">Data <span class="req">*</span></label>
              <input type="date" id="f-data"/>
            </div>
            <div class="f-item" style="width:80px">
              <label class="fl">CFOP</label>
              <input type="text" id="f-cfop" placeholder="CFOP" class="f-disabled" disabled/>
            </div>
            <div class="f-item" style="flex:1">
              <label class="fl">Chave de Acesso</label>
              <input type="text" id="f-chave" placeholder="Preenchido automaticamente" class="f-disabled" disabled/>
            </div>
            <div style="flex-shrink:0;padding-bottom:1px">
              <button class="btn bb" id="btn-replicar" disabled onclick="replicarNF()" style="height:28px;white-space:nowrap">Replicar NF de venda</button>
            </div>
          </div>
          <!-- Linha 2: Depositante + Fornecedor + PO + Código Interno -->
          <div class="g4">
            <div class="f-item">
              <label class="fl">Depositante <span class="req">*</span></label>
              <select id="f-dep">
                <option value="">Selecione</option>
                <option>Nespresso</option>
              </select>
            </div>
            <div class="f-item">
              <label class="fl">Tipo de Recebimento <span class="req">*</span></label>
              <select id="f-tipo-rec" style="background:#f5f5f5"></select>
              <div class="hint" id="f-tipo-rec-hint" style="display:none">Único tipo disponível preenchido automaticamente</div>
            </div>
            <div class="f-item">
              <label class="fl">Fornecedor</label>
              <input type="text" id="f-forn" placeholder="Fornecedor"/>
            </div>
            <div class="f-item">
              <label class="fl">Número PO/Delivery</label>
              <input type="text" id="f-po" placeholder="Número PO ou Delivery"/>
            </div>
            <div class="f-item">
              <label class="fl">Código Interno Emitente</label>
              <input type="text" id="f-cod-int" placeholder="Código interno"/>
            </div>
          </div>
        </div>

        <div class="form-sec" style="margin-top:6px">
          <div class="form-sec-title">Dados Complementares</div>
          <div class="g4">
            <div class="f-item">
              <label class="fl">CPF / CNPJ do Cliente</label>
              <div style="display:flex;gap:6px">
                <input type="text" id="f-cpf" placeholder="CPF ou CNPJ" style="flex:1" oninput="buscaCliente(this.value)"/>
                <button class="btn bo btn-sm" style="height:28px" onclick="buscaCliente(document.getElementById('f-cpf').value)">Buscar</button>
              </div>
              <div class="hint">Preencha para buscar o cliente no cadastro</div>
            </div>
            <div class="f-item">
              <label class="fl">Cliente</label>
              <input type="text" id="f-cliente" placeholder="Preenchido automaticamente" class="f-disabled" disabled/>
            </div>
            <div class="f-item">
              <label class="fl">Código NN <span class="opt">(opcional)</span></label>
              <input type="text" id="f-nn" placeholder="Código NN"/>
            </div>

          </div>
        </div>

        <!-- ITENS -->
        <div class="form-sec" style="margin-top:6px">
          <div class="form-sec-title">Itens da Nota Fiscal</div>
          <div id="info-itens-b2c" class="info-box" style="display:none">Itens replicados automaticamente da nota fiscal de venda. Não podem ser alterados. Use o checkbox de divergência quando necessário.</div>
          <div id="info-itens-b2b" class="warn-box">Adicione os itens via leitura de código de barras ou digitação manual do código do produto.</div>
          <div class="items-wrap">
            <table class="items-tbl">
              <thead>
                <tr>
                  <th>PN</th>
                  <th>Barra</th>
                  <th>Descrição</th>
                  <th>Qtde.</th>
                  <th>Valor Unit.</th>
                  <th>Lote</th>
                  <th>Série</th>
                  <th>Divergência</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="itens-tbody">
                <tr id="row-empty"><td colspan="9" style="text-align:center;color:#aaa;padding:16px;font-style:italic">Nenhum item adicionado.</td></tr>
              </tbody>
            </table>

function now(){return new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});}
function today(){return new Date().toLocaleDateString('pt-BR');}
function todayISO(){var d=new Date();return d.getFullYear()+'-'+(String(d.getMonth()+1).padStart(2,'0'))+'-'+String(d.getDate()).padStart(2,'0');}

// NAVEGAÇÃO
var _navHist=[];
function nav(p){
  var cur=document.querySelector('.page.active');
  if(cur&&cur.id!=='page-'+p)_navHist.push(cur.id.replace('page-',''));
  document.querySelectorAll('.page').forEach(function(x){x.classList.remove('active')});
  document.querySelectorAll('.sb-btn[id^="sb-"]').forEach(function(x){x.classList.remove('active')});
  document.getElementById('page-'+p).classList.add('active');
  var sb=document.getElementById('sb-'+p);if(sb)sb.classList.add('active');
  if(p==='ger'){renderTable();updateCounters();}
  if(p==='nr')resetNR();
  _updateBackBtn();
}
function _goBack(){
  if(_navHist.length===0)return;
  var prev=_navHist.pop();
  document.querySelectorAll('.page').forEach(function(x){x.classList.remove('active')});
  document.getElementById('page-'+prev).classList.add('active');
  if(prev==='ger'){renderTable();updateCounters();}
  _updateBackBtn();
}
function _updateBackBtn(){
  document.querySelectorAll('.back-btn').forEach(function(b){
    b.style.display=_navHist.length>0?'inline-flex':'none';
  });
}

// GERENCIADOR
function filtrar(s){
  statusAtivo=s;selected=[];
  document.getElementById('f-status').value=s;
  document.querySelectorAll('.pc').forEach(function(c){c.classList.remove('active')});
  var map={env:'pc-env',lib:'pc-lib',tri:'pc-tri',div:'pc-div'};
  document.getElementById(map[s]).classList.add('active');
  renderTable();
}
function onFStatus(){filtrar(document.getElementById('f-status').value);}


function getBadge(d){
  var map={env:'<span class="badge b-blue">Aguard. envio cliente</span>',lib:'<span class="badge b-red">Aguard. liberação triagem</span>',tri:'<span class="badge b-green">Aguardando triagem</span>'};
  return map[d.status]||d.status;
}

function renderTable(){
  var filtered=statusAtivo==='div'?nrs.filter(function(d){return d.div}):nrs.filter(function(d){return d.status===statusAtivo});
  var thead=document.getElementById('thead');
  var tbody=document.getElementById('tbody');
  var btnCSV=document.getElementById('btn-csv');
  var btnLib=document.getElementById('btn-lib');
  if(!thead||!tbody) return;

  btnCSV.style.display=statusAtivo==='env'?'inline-flex':'none';
  var temSel=selected.length>0&&selected.some(function(id){var d=nrs.find(function(x){return x.id===id});return d&&d.csv;});
  btnLib.style.display=(statusAtivo==='lib'&&temSel)?'inline-flex':'none';
  if(btnLib.style.display!=='none')btnLib.textContent='▶ Liberar para Triagem ('+selected.length+')';
  var btnEtqLote=document.getElementById('btn-etq-lote');
  btnEtqLote.style.display=selected.length>0?'inline-flex':'none';
  if(selected.length>0)btnEtqLote.textContent='🖨 Imprimir Etiquetas ('+selected.length+')';

  var cols='<th><input type="checkbox" id="chk-all" onchange="selAll(this.checked)"/></th><th>Data</th><th>N. NR</th><th>N. NF</th><th>Cliente</th><th>CPF/CNPJ</th><th>Cód. NN</th><th>Pedido</th><th>Status</th><th>Ações</th>';
  if(statusAtivo==='env')cols+='<th>CSV</th>';
  else if(statusAtivo==='lib')cols+='<th>CSV gerado por</th><th>Cancelar</th>';
  else if(statusAtivo==='tri')cols+='<th>Liberado por</th>';
  thead.innerHTML=cols;

  tbody.innerHTML=filtered.map(function(d){
    var chk='<input type="checkbox" onchange="toggleSel('+d.id+',this.checked)" '+(selected.includes(d.id)?'checked':'')+'/>';
    var divObs=d.divObs?d.divObs:'';
  var nfCell=(d.div?'<span style="color:#c62828;font-size:14px;font-weight:700;margin-right:4px;vertical-align:middle" title="'+divObs+'">⚠</span>':'')+d.nf+(d.div&&divObs?'<div style="font-size:9px;color:#c62828;margin-top:2px">'+divObs+'</div>':'');
    var extra='';
    if(statusAtivo==='env'){
      var csvB=d.csv?'<span class="badge b-teal">✓ '+d.csvInfo+'</span>':'<span style="color:#aaa;font-size:9px">Não gerado</span>';
      extra='<td>'+csvB+'</td>';
    }else if(statusAtivo==='lib'){
      extra='<td style="font-size:9px;color:#555">'+d.csvInfo+'</td><td><button class="btn br btn-sm" onclick="openCancelLib('+d.id+')">✕ Cancelar</button></td>';
    }else if(statusAtivo==='tri'){
      extra='<td style="font-size:9px;color:#555">'+d.libInfo+'</td>';
    }
    var etqImpresso=d.etqHist&&d.etqHist.length>0;
    var btnImpr='<button class="btn btn-sm" style="'+(etqImpresso?'background:#1b5e20;color:#fff':'background:#fff;color:#0057b8;border:1px solid #0057b8')+'" onclick="openEtiquetaSingle('+d.id+')" title="'+(etqImpresso?'Reimprimir etiqueta de volume':'Imprimir etiqueta de volume')+'">🖨</button>';
    var btnHist='<button class="btn bo btn-sm" onclick="openHistorico('+d.id+')" title="Histórico de impressão" style="margin-left:4px">📋</button>';
    var acaoCell='<td style="white-space:nowrap">'+btnImpr+btnHist+'</td>';
    return'<tr'+(d.div?' class="div-row"':'')+' ><td>'+chk+'</td><td>'+d.data+'</td><td><a class="lnk">'+d.nr+'</a></td><td>'+nfCell+'</td><td>'+d.cliente+'</td><td>'+d.cnpj+'</td><td>'+(d.nn||'—')+'</td><td>'+(d.pedido||'—')+'</td><td>'+getBadge(d)+'</td>'+acaoCell+extra+'</tr>';
  }).join('');
  if(!filtered.length)tbody.innerHTML='<tr><td colspan="11" style="text-align:center;color:#aaa;padding:20px;font-style:italic">Nenhum registro para este status.</td></tr>';
}

function toggleSel(id,c){
  if(c){if(!selected.includes(id))selected.push(id);}
  else{selected=selected.filter(function(x){return x!==id});}
  renderTable();
  var f=statusAtivo==='div'?nrs.filter(function(d){return d.div}):nrs.filter(function(d){return d.status===statusAtivo});
  var chkAll=document.getElementById('chk-all');
  if(chkAll)chkAll.checked=selected.length>0&&f.every(function(d){return selected.includes(d.id);});
}
function selAll(c){
  var f=statusAtivo==='div'?nrs.filter(function(d){return d.div}):nrs.filter(function(d){return d.status===statusAtivo});
  selected=c?f.map(function(d){return d.id}):[];
  renderTable();
  var chkAll=document.getElementById('chk-all');
  if(chkAll)chkAll.checked=c;
}

// CSV
function openCSV(){document.getElementById('modal-csv').classList.add('show');}
function confirmarCSV(){
  var targets=selected.length>0?nrs.filter(function(d){return selected.includes(d.id)&&d.status==='env'}):nrs.filter(function(d){return d.status==='env'});
  targets.forEach(function(d){d.csv=true;d.csvInfo=today()+' '+now()+' – Alessandro';d.status='lib';});
  selected=[];closeM('modal-csv');updateCounters();
  showOK('CSV gerado com sucesso! NRs movidas para "Aguardando liberação triagem".');
  setTimeout(function(){closeM('modal-ok');filtrar('lib');},1600);
}

// LIBERAR
function openLiberar(){
  var targets=selected.length>0?nrs.filter(function(d){return selected.includes(d.id)&&d.status==='lib'}):nrs.filter(function(d){return d.status==='lib'});
  targets.forEach(function(d){d.status='tri';d.libInfo=today()+' '+now()+' – Alessandro';});
  var count=targets.length;
  selected=[];updateCounters();
  var libMsg=document.getElementById('lib-ok-msg');
  if(libMsg) libMsg.textContent=count+' NF'+(count>1?'s foram liberadas':' foi liberada')+' para triagem com sucesso.';
  var libModal=document.getElementById('modal-lib-ok');
  if(libModal) libModal.classList.add('show');
  renderTable();
}
function openCancelLib(id){cancelLibId=id;document.getElementById('modal-cancel-lib').classList.add('show');}
function confirmarCancelLib(){if(cancelLibId){var d=nrs.find(function(x){return x.id===cancelLibId});if(d){d.status='lib';d.libInfo='';}}cancelLibId=null;closeM('modal-cancel-lib');updateCounters();renderTable();}

// FORM NR
function initTipoRecebimento(){
  var sel=document.getElementById('f-tipo-rec');
  var hint=document.getElementById('f-tipo-rec-hint');
  if(!sel) return;
  sel.innerHTML='';
  if(tiposRecebimento.length===1){
    var opt=document.createElement('option');
    opt.value=tiposRecebimento[0].id;
    opt.textContent=tiposRecebimento[0].desc;
    sel.appendChild(opt);
    sel.disabled=true;
    sel.style.background='#f5f5f5';
    sel.style.color='#666';
    hint.style.display='block';
  }else{
    sel.disabled=false;
    sel.style.background='#fff';
    sel.style.color='#333';
    hint.style.display='none';
    var optDefault=document.createElement('option');
    optDefault.value='';optDefault.textContent='Selecione um tipo de recebimento';
    sel.appendChild(optDefault);
    tiposRecebimento.forEach(function(t){
      var opt=document.createElement('option');
      opt.value=t.id;opt.textContent=t.desc;
      sel.appendChild(opt);
    });
  }
}

function resetNR(){
  insucessoOn=false;replicado=false;itemCount=0;
  var chkIns=document.getElementById('chk-ins');if(!chkIns)return;
  chkIns.checked=false;
  initTipoRecebimento();
  var insHint=document.getElementById('ins-hint');
  if(insHint){insHint.textContent='Marque para replicar automaticamente uma nota fiscal de venda existente';insHint.style.color='#5c7fb8';}
  setFieldsInsucesso(false);
  limparForm();
  var fdata=document.getElementById('f-data');if(fdata)fdata.value=todayISO();
}

function limparForm(){
  ['f-numero','f-serie','f-chave','f-cfop','f-forn','f-po','f-cod-int','f-cpf','f-nn'].forEach(function(id){
    var el=document.getElementById(id);if(el)el.value='';
  });
  document.getElementById('f-cliente').value='';

  var tipo=etqIdsParaImprimir.length===1&&nrs.find(function(x){return x.id===etqIdsParaImprimir[0];})&&nrs.find(function(x){return x.id===etqIdsParaImprimir[0];}).etqHist.length>0?'Reimpressão':'Impressão';

.modal{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:480px;overflow:hidden;box-shadow:0 -8px 32px rgba(0,0,0,.2);animation:slideup .25s}
@keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-hdr{background:linear-gradient(90deg,#0057b8,#1a9fd4);padding:16px 20px;color:#fff;font-size:14px;font-weight:700}
.modal-body{padding:20px}
.modal-foot{padding:12px 20px 24px;display:flex;flex-direction:column;gap:8px}
.ok-icon{width:60px;height:60px;border-radius:50%;border:3px solid #1b5e20;display:flex;align-items:center;justify-content:center;margin:4px auto 14px;color:#1b5e20;font-size:28px;font-weight:700}

.footer{text-align:center;font-size:10px;color:#bbb;padding:16px}
</style>
</head>
<body>



<div class="stepbar">
  <div class="step active" id="step1"><div class="step-dot">1</div><div class="step-lbl">Tarefa</div></div>
  <div class="step-line" id="line1"></div>
  <div class="step" id="step2"><div class="step-dot">2</div><div class="step-lbl">Origem</div></div>
  <div class="step-line" id="line2"></div>
  <div class="step" id="step3"><div class="step-dot">3</div><div class="step-lbl">Volumes</div></div>
  <div class="step-line" id="line3"></div>
  <div class="step" id="step4"><div class="step-dot">4</div><div class="step-lbl">Destino</div></div>
</div>

<div class="main">

  <!-- TELA 1: SELECIONAR TAREFA -->
  <div class="screen active" id="sc-tarefa">
    <div id="banner-unica" style="display:none">
      <div class="banner">
        <div class="banner-icon">⇄</div>
        <div class="banner-text">
          <div class="banner-title">Tarefa identificada automaticamente</div>
          <div class="banner-sub">Existe apenas uma tarefa de remanejamento pendente. Selecionando automaticamente...</div>
        </div>
      </div>
    </div>
    <div id="lista-tarefas"></div>
    <div class="footer">2022 – 2026 © Wiser Log –</div>
  </div>

  <!-- TELA 2: ENDEREÇO DE ORIGEM -->
  <div class="screen" id="sc-origem">
    <!-- BIPE NO TOPO -->
    <div class="bipe-principal">
      <div class="bipe-label"><span>📷</span> Bipe o endereço de origem</div>
      <input type="text" id="origem-input" placeholder="Leia o código de barras do endereço" onkeydown="if(event.key==='Enter')validarOrigem(this.value)"/>
      <div class="bipe-hint">Aproxime o leitor ao endereço onde os volumes estão armazenados</div>
      <div class="alerta-end" id="alerta-end">
        <div style="color:#c62828;font-weight:700;font-size:12px;margin-bottom:4px">⚠ Endereço não corresponde à tarefa</div>
        <div style="font-size:11px;color:#c62828" id="alerta-end-msg">Verifique o endereço e tente novamente.</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Informações da Tarefa <span class="badge b-orange" id="tarefa-badge-origem">REM-001</span></div>
      <div class="counters">
        <div class="counter c-ok"><label>NFs na tarefa</label><div class="val" id="origem-nfs">0</div></div>
        <div class="counter c-ok"><label>Total volumes</label><div class="val" id="origem-vols">0</div></div>
      </div>
      <div style="font-size:11px;font-weight:700;color:#555;margin-bottom:8px">Endereços esperados</div>
      <div class="tbl-wrap">
        <table><thead><tr><th>Endereço</th><th>NFs</th><th>Volumes</th></tr></thead>
        <tbody id="origem-ends-tbody"></tbody></table>
      </div>
    </div>
    <button class="btn btn-gray" onclick="voltarTarefas()">← Voltar</button>
    <div class="footer">2022 – 2026 © Wiser Log –</div>
  </div>

  <!-- TELA 3: LEITURA DE VOLUMES -->
  <div class="screen" id="sc-leitura">
    <!-- BIPE FIXO NO TOPO -->
    <div class="bipe-principal bipe-sticky">
      <div class="bipe-label"><span>📷</span> Bipe a etiqueta da NR / NF</div>
      <input type="text" id="bipe-input" placeholder="Leia o código de barras da etiqueta" onkeydown="if(event.key==='Enter')lerEtiqueta(this.value)"/>
      <div class="bipe-hint">Bipe cada volume para contabilizar</div>
      <div class="alerta-nf" id="alerta-nf">
        <div class="alerta-nf-msg">⚠ NF não pertence à tarefa de remanejamento</div>
        <button class="btn btn-red" style="height:42px;font-size:12px" onclick="fecharAlertaNF()">OK — Continuar leitura</button>
      </div>
    </div>

    <div class="counters">
      <div class="counter c-ok"><label>NFs processadas</label><div class="val" id="cnt-proc-nfs">0</div></div>
      <div class="counter c-pend"><label>NFs pendentes</label><div class="val" id="cnt-pend-nfs">0</div></div>
      <div class="counter c-ok"><label>Vol. separados</label><div class="val" id="cnt-proc-vols">0</div></div>
      <div class="counter c-pend"><label>Vol. pendentes</label><div class="val" id="cnt-pend-vols">0</div></div>
    </div>

    <div class="card">
      <div class="card-title">Acompanhamento das NFs</div>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>NR</th><th>NF</th><th>Vol.</th><th>Lidos</th><th>Status</th></tr></thead>
          <tbody id="nfs-tbody"></tbody>
        </table>
      </div>
    </div>

    <button class="btn btn-green" id="btn-finalizar" disabled onclick="irDestino()" style="display:none">✓ Todos lidos — Confirmar destino</button>
    <div class="footer">2022 – 2026 © Wiser Log –</div>
  </div>

  <!-- TELA 4: ENDEREÇO DE DESTINO -->
  <div class="screen" id="sc-destino">
    <div class="success-box">
      <div class="si">✓</div>
      <p>Separação concluída!<br>Bipe o endereço de destino para efetivar o remanejamento.</p>
    </div>

    <!-- BIPE NO TOPO -->
    <div class="bipe-principal">
      <div class="bipe-label"><span>📷</span> Bipe o endereço de destino</div>
      <input type="text" id="destino-input" placeholder="Bancada ou endereço de triagem" onkeydown="if(event.key==='Enter')confirmarDestino(this.value)"/>
      <div class="bipe-hint">Após bipagem os volumes assumirão o status do setor vinculado</div>
    </div>

    <div class="card">
      <div class="card-title">Resumo da Operação</div>
      <div class="resumo-item"><span class="resumo-label">Tarefa</span><span class="resumo-val" id="res-tarefa">—</span></div>
      <div class="resumo-item"><span class="resumo-label">Endereço origem</span><span class="resumo-val" id="res-origem">—</span></div>
      <div class="resumo-item"><span class="resumo-label">NFs movidas</span><span class="resumo-val" id="res-nfs">—</span></div>
      <div class="resumo-item"><span class="resumo-label">Volumes</span><span class="resumo-val" id="res-vols">—</span></div>
    </div>
    <button class="btn btn-gray" onclick="voltarLeitura()">← Voltar</button>
    <div class="footer">2022 – 2026 © Wiser Log –</div>
  </div>

</div><!-- /main -->

<!-- MODAL SUCESSO -->
<div class="overlay" id="modal-ok">
  <div class="modal">
    <div class="modal-hdr">Remanejamento Concluído</div>
    <div class="modal-body" style="text-align:center">
      <div class="ok-icon">✓</div>
      <p style="font-size:12px;color:#444;line-height:1.8" id="ok-msg"></p>
    </div>
    <div class="modal-foot">
      <button class="btn btn-blue" onclick="reiniciar()">OK — Nova tarefa</button>
    </div>
  </div>
</div>

<!-- MODAL ALERTA -->
<div class="overlay" id="modal-alerta">
  <div class="modal">
    <div class="modal-hdr">Atenção</div>
    <div class="modal-body" style="text-align:center;padding:20px">
      <p style="font-size:13px;color:#444;line-height:1.6" id="alerta-msg"></p>
    </div>
    <div class="modal-foot">
      <button class="btn btn-blue" onclick="closeM('modal-alerta')">OK</button>
    </div>
  </div>
</div>

<script>
var tarefaAtual=null, origemAtual=null, remNFs=[];

var tarefasData=[
  {id:1,desc:'REM-001',dataLib:'26/05/2026 09:14',
   nfs:[{nr:'NR-00406',nf:'45676/1',vols:2,lidos:0,concluida:false},{nr:'NR-00407',nf:'45677/1',vols:2,lidos:0,concluida:false},{nr:'NR-00408',nf:'45678/1',vols:1,lidos:0,concluida:false}],
   enderecos:[{end:'END-DEV-01',nfs:3,vols:5}]}
];

function initTarefas(){
  var pendentes=tarefasData.filter(function(t){return !t.concluida;});
  var lista=document.getElementById('lista-tarefas');
  var banner=document.getElementById('banner-unica');

  if(!pendentes.length){
    if(lista) lista.innerHTML='<div class="card" style="text-align:center;padding:32px;color:#aaa"><div style="font-size:40px;margin-bottom:10px">✓</div><div style="font-size:13px;font-weight:700">Nenhuma tarefa pendente</div><div style="font-size:11px;margin-top:4px">Todas as tarefas de remanejamento foram concluídas.</div></div>';
    if(banner) banner.style.display='none';
    return;
  }

  if(pendentes.length===1){
    if(banner) banner.style.display='block';
    if(lista) lista.innerHTML='';
    setTimeout(function(){selecionarTarefa(pendentes[0].id);},1200);
    return;
  }

  if(banner) banner.style.display='none';
  if(!lista) return;
  lista.innerHTML='<div style="font-size:12px;font-weight:700;color:#555;margin-bottom:10px">'+pendentes.length+' tarefas pendentes — selecione uma:</div>';
  pendentes.forEach(function(t){
    var totalVols=t.nfs.reduce(function(a,n){return a+n.vols;},0);
    var ends=t.enderecos.map(function(e){return'<span class="badge b-blue" style="margin-right:3px">'+e.end+'</span>';}).join('');
    var div=document.createElement('div');
    div.className='tarefa-item';
    div.innerHTML='<div><div class="tarefa-id">'+t.desc+'</div><div class="tarefa-meta">'+t.dataLib+'<br>'+t.nfs.length+' NFs · '+totalVols+' volumes<br>'+ends+'</div></div><div class="tarefa-chevron">›</div>';
    div.onclick=function(){selecionarTarefa(t.id);};
    lista.appendChild(div);
  });
}

function selecionarTarefa(id){
  tarefaAtual=tarefasData.find(function(t){return t.id===id;});
  if(!tarefaAtual) return;
  remNFs=tarefaAtual.nfs.map(function(n){return{nr:n.nr,nf:n.nf,vols:n.vols,lidos:0,concluida:false};});
  var totalVols=remNFs.reduce(function(a,n){return a+n.vols;},0);
  var el;
  el=document.getElementById('tarefa-badge-origem'); if(el) el.textContent=tarefaAtual.desc;
  el=document.getElementById('origem-nfs'); if(el) el.textContent=remNFs.length;
  el=document.getElementById('origem-vols'); if(el) el.textContent=totalVols;
  var tbody=document.getElementById('origem-ends-tbody');
  if(tbody) tbody.innerHTML=tarefaAtual.enderecos.map(function(e){return'<tr><td><strong>'+e.end+'</strong></td><td>'+e.nfs+'</td><td>'+e.vols+'</td></tr>';}).join('');
  var alertaEnd=document.getElementById('alerta-end'); if(alertaEnd) alertaEnd.classList.remove('show');
  showScreen('sc-origem'); setStep(2);
  var inp=document.getElementById('origem-input'); if(inp){inp.value='';setTimeout(function(){inp.focus();},300);}
}

function validarOrigem(val){
  var inp=document.getElementById('origem-input');
  if(!val||!val.trim()) return;
  var bipado=val.trim().toUpperCase();
  var validos=tarefaAtual.enderecos.map(function(e){return e.end.toUpperCase();});
  if(validos.indexOf(bipado)===-1){
    var alerta=document.getElementById('alerta-end');
    var msg=document.getElementById('alerta-end-msg');
    if(msg) msg.textContent='Endereço "'+val.trim()+'" não corresponde aos endereços desta tarefa. Esperado: '+tarefaAtual.enderecos.map(function(e){return e.end;}).join(', ')+'.';
    if(alerta) alerta.classList.add('show');
    if(inp){inp.value='';setTimeout(function(){inp.focus();},100);}
    return;
  }
  origemAtual=val.trim();
  var alertaEnd=document.getElementById('alerta-end'); if(alertaEnd) alertaEnd.classList.remove('show');
  var totalVols=remNFs.reduce(function(a,n){return a+n.vols;},0);
  var el;
  el=document.getElementById('cnt-proc-nfs'); if(el) el.textContent=0;
  el=document.getElementById('cnt-pend-nfs'); if(el) el.textContent=remNFs.length;
  el=document.getElementById('cnt-proc-vols'); if(el) el.textContent=0;
  el=document.getElementById('cnt-pend-vols'); if(el) el.textContent=totalVols;
  el=document.getElementById('btn-finalizar'); if(el) el.disabled=true;
  renderNFsTabela();
  showScreen('sc-leitura'); setStep(3);
  var bipe=document.getElementById('bipe-input'); if(bipe){bipe.value='';setTimeout(function(){bipe.focus();},300);}
}

function voltarTarefas(){tarefaAtual=null;origemAtual=null;remNFs=[];showScreen('sc-tarefa');setStep(1);initTarefas();}
function voltarLeitura(){showScreen('sc-leitura');setStep(3);}

function lerEtiqueta(val){
  var inp=document.getElementById('bipe-input');
  if(!val||!val.trim()) return;
  var lido=val.trim().toUpperCase(); if(inp) inp.value='';
  var nf=remNFs.find(function(n){return n.nr.toUpperCase()===lido||n.nf.toUpperCase()===lido||n.nf.replace('/','').toUpperCase()===lido||lido.indexOf(n.nr.toUpperCase())!==-1;});
  if(!nf){var a=document.getElementById('alerta-nf');if(a)a.classList.add('show');return;}
  if(nf.concluida){showAlerta('Todos os volumes desta NF já foram lidos.');setTimeout(function(){if(inp)inp.focus();},400);return;}
  nf.lidos++;if(nf.lidos>=nf.vols)nf.concluida=true;
  atualizarContadores();renderNFsTabela();
  var todos=remNFs.every(function(n){return n.concluida;});
  if(todos){
    setTimeout(function(){irDestino();},600);
  } else {
    var btn=document.getElementById('btn-finalizar');if(btn)btn.disabled=!todos;
    setTimeout(function(){if(inp)inp.focus();},100);
  }
}

function fecharAlertaNF(){var a=document.getElementById('alerta-nf');if(a)a.classList.remove('show');setTimeout(function(){var b=document.getElementById('bipe-input');if(b)b.focus();},100);}

function atualizarContadores(){
  var pN=remNFs.filter(function(n){return n.concluida;}).length;
  var dN=remNFs.filter(function(n){return!n.concluida;}).length;
  var pV=remNFs.reduce(function(a,n){return a+n.lidos;},0);
  var dV=remNFs.reduce(function(a,n){return a+(n.vols-n.lidos);},0);
  var el;
  el=document.getElementById('cnt-proc-nfs');if(el)el.textContent=pN;
  el=document.getElementById('cnt-pend-nfs');if(el)el.textContent=dN;
  el=document.getElementById('cnt-proc-vols');if(el)el.textContent=pV;
  el=document.getElementById('cnt-pend-vols');if(el)el.textContent=dV;
}

function renderNFsTabela(){
  var tbody=document.getElementById('nfs-tbody');
  if(!tbody)return;
  while(tbody.firstChild)tbody.removeChild(tbody.firstChild);
  remNFs.forEach(function(n){
    var tr=document.createElement('tr');if(n.concluida)tr.className='done-row';
    var tds=[n.nr,n.nf,n.vols,n.lidos];
    tds.forEach(function(v){var td=document.createElement('td');td.textContent=v;tr.appendChild(td);});
    var td5=document.createElement('td');
    td5.innerHTML=n.concluida?'<span class="badge b-green">✓ OK</span>':'<span class="badge b-red">+' +(n.vols-n.lidos)+'</span>';
    tr.appendChild(td5);tbody.appendChild(tr);
  });
}

function irDestino(){
  var totalVols=remNFs.reduce(function(a,n){return a+n.vols;},0);
  var el;
  el=document.getElementById('res-tarefa');if(el&&tarefaAtual)el.textContent=tarefaAtual.desc;
  el=document.getElementById('res-origem');if(el)el.textContent=origemAtual||'—';
  el=document.getElementById('res-nfs');if(el)el.textContent=remNFs.length+' NF(s)';
  el=document.getElementById('res-vols');if(el)el.textContent=totalVols+' volume(s)';
  showScreen('sc-destino');setStep(4);
  var inp=document.getElementById('destino-input');if(inp){inp.value='';setTimeout(function(){inp.focus();},300);}
}

function confirmarDestino(val){
  if(!val||!val.trim()){return;}
  var destino=val.trim();
  var totalVols=remNFs.reduce(function(a,n){return a+n.vols;},0);
  var el=document.getElementById('ok-msg');
  if(el)el.innerHTML='<strong>'+remNFs.length+' NF(s)</strong> e <strong>'+totalVols+' volume(s)</strong> movidos com sucesso.<br><br>Origem: <strong>'+(origemAtual||'—')+'</strong><br>Destino: <strong>'+destino+'</strong>';
  document.getElementById('modal-ok').classList.add('show');
}

function reiniciar(){
  closeM('modal-ok');
  // Marcar tarefa atual como concluída
  if(tarefaAtual){
    var t=tarefasData.find(function(x){return x.id===tarefaAtual.id;});
    if(t) t.concluida=true;
  }
  tarefaAtual=null;origemAtual=null;remNFs=[];
  showScreen('sc-tarefa');setStep(1);initTarefas();
}

function showScreen(id){document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});var el=document.getElementById(id);if(el)el.classList.add('active');window.scrollTo(0,0);}

function setStep(active){
  for(var i=1;i<=4;i++){
    var el=document.getElementById('step'+i);if(!el)continue;
    el.classList.remove('active','done');
    var dot=el.querySelector('.step-dot');
    if(i<active){el.classList.add('done');if(dot)dot.textContent='✓';}
    else if(i===active){el.classList.add('active');if(dot)dot.textContent=String(i);}
    else{if(dot)dot.textContent=String(i);}
    var line=document.getElementById('line'+i);
    if(line){line.style.background=i<active?'#1b5e20':'#e4e6ea';}
  }
}

function closeM(id){var el=document.getElementById(id);if(el)el.classList.remove('show');}
function showAlerta(msg){var el=document.getElementById('alerta-msg');if(el)el.textContent=msg;document.getElementById('modal-alerta').classList.add('show');}

initTarefas();

function showOK(msg){var el=document.getElementById('ok-msg');if(el)el.textContent=msg;document.getElementById('modal-ok').classList.add('show');}
</script>
</body>
</html>

</template>
<template id="tpl-tri">
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wiser Log — Triagem de Devolução</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;font-size:12px;background:#f0f2f5}


.hdr-logo span{background:#fff;color:#0057b8;font-size:9px;font-weight:700;padding:1px 4px;border-radius:2px}






.sb-btn:hover,
.main{padding:18px;min-height:calc(100vh-46px)}
.page{display:none}.page.active{display:block}
.bread{font-size:10px;color:#aaa;margin-bottom:6px}
.bread a{color:#0057b8;cursor:pointer;text-decoration:none}
.page-title{font-size:13px;font-weight:700;color:#222;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.card{background:#fff;border-radius:6px;box-shadow:0 1px 4px rgba(0,0,0,.07);padding:18px;margin-bottom:12px}
.sec{font-size:10px;font-weight:700;color:#0057b8;text-transform:uppercase;letter-spacing:.04em;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid #dde8f8;display:flex;justify-content:space-between;align-items:center}

.pc:hover,.pc.active{box-shadow:0 3px 10px rgba(0,0,0,.12)}
.pc .n{font-size:28px;font-weight:700;line-height:1.1}
.pc .l{font-size:9px;color:#777;margin-top:5px;line-height:1.4}
.pc-1 .n{color:#e65100}.pc-1.active{border-color:#e65100;background:#fff3e0}
.pc-2 .n{color:#1b5e20}.pc-2.active{border-color:#1b5e20;background:#e8f5e9}
.filters{display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
select,input[type=text],input[type=date],input[type=password]{font-size:10px;padding:4px 8px;border:1px solid #d8dde6;border-radius:4px;background:#fff;color:#333;height:28px;font-family:Arial}
.btn{border:none;border-radius:4px;padding:4px 14px;font-size:10px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:5px;height:28px;font-family:Arial}
.bb{background:#0057b8;color:#fff}.bb:hover{background:#004494}
.bg{background:#757575;color:#fff}
.br{background:#c62828;color:#fff}
.bk{background:#1b5e20;color:#fff}
.bo{background:#fff;color:#0057b8;border:1px solid #0057b8}
.btn-sm{height:22px;padding:0 8px;font-size:9px}
.btn:disabled{background:#d0d0d0;color:#888;cursor:not-allowed;pointer-events:none}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:10px}
th{background:#f8f9fa;padding:8px 10px;text-align:left;font-weight:700;color:#555;border-bottom:2px solid #e4e6ea;white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid #f0f2f5;color:#333;vertical-align:middle}
tr:hover td{background:#fafbfc}
.lnk{color:#0057b8;cursor:pointer;font-weight:600}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:9px;font-weight:700;white-space:nowrap}
.b-orange{background:#fff3e0;color:#e65100}
.b-blue{background:#e8f0fe;color:#1565c0}
.b-green{background:#e8f5e9;color:#1b5e20}
.b-red{background:#ffebee;color:#c62828}
.b-teal{background:#e0f2f1;color:#004d40}
.b-warn{background:#ffebee;color:#c62828;border:1px solid #ef9a9a}
.b-purple{background:#f3e5f5;color:#6a1b9a}
.b-gray{background:#f5f5f5;color:#555}
/* BANCADA SELECTOR */
.bancada-selector{max-width:480px;margin:40px auto;text-align:center}
.bancada-selector .icon{font-size:36px;margin-bottom:12px}
.bancada-selector h2{font-size:14px;font-weight:700;color:#222;margin-bottom:6px}
.bancada-selector p{font-size:11px;color:#888;margin-bottom:18px}
.bancada-bipe{display:flex;gap:8px;margin-bottom:12px}
.bancada-bipe input{flex:1;height:36px;font-size:12px;border:2px solid #d8dde6;border-radius:5px;padding:0 12px}
.bancada-bipe input:focus{outline:none;border-color:#0057b8}
.bancada-bipe button{height:36px}
.bancada-erro{font-size:10px;color:#c62828;margin-top:6px;display:none}
.bancada-lista{display:flex;flex-direction:column;gap:8px;margin-top:10px}
.bancada-item{background:#fff;border:1.5px solid #e4e6ea;border-radius:6px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:all .15s}
.bancada-item:hover{border-color:#0057b8;background:#f0f7ff}
.bancada-item-info{}
.bancada-item-cod{font-size:13px;font-weight:700;color:#0057b8}
.bancada-item-desc{font-size:10px;color:#888;margin-top:2px}
/* BANCADA HEADER */
.bancada-hdr{background:#e8f0fe;border:1px solid #b8d0f0;border-radius:5px;padding:8px 14px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.bancada-hdr-info{font-size:11px;color:#0057b8;font-weight:700}
.bancada-hdr-sub{font-size:10px;color:#5c7fb8}
/* CAIXAS */
.caixas-grupo{margin-bottom:16px}
.caixas-grupo-titulo{font-size:10px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;padding:6px 10px;background:#f8f9fa;border-radius:4px;border:1px solid #e4e6ea}
.caixas-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:8px}
.caixa-card{background:#fff;border:1.5px solid #e4e6ea;border-radius:6px;padding:12px}
.caixa-card.aberta{border-color:#1b5e20;background:#f1f8e9}
.caixa-card.aberta.pendente{border-color:#f9a825;background:#fffde7}
.caixa-card.fechada{opacity:.6;border-color:#aaa}
.caixa-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.caixa-cod{font-size:11px;font-weight:700;color:#333}
.caixa-info{font-size:10px;color:#888;margin-bottom:8px}
.caixa-actions{display:flex;gap:5px}
/* NF / ITEM */
.nf-item{background:#fff;border:1.5px solid #e4e6ea;border-radius:6px;padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .15s}
.nf-item:hover{border-color:#0057b8;background:#f8fbff}
.nf-info{flex:1}
.nf-id{font-size:12px;font-weight:700;color:#0057b8}
.nf-meta{font-size:10px;color:#888;margin-top:3px}
.item-row{background:#fff;border:1.5px solid #e4e6ea;border-radius:6px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .15s}
.item-row:hover{border-color:#0057b8;background:#f8fbff}
.item-row.done{border-color:#1b5e20;background:#f1f8e9;opacity:.75;cursor:default}
.item-row-info{flex:1}
.item-pn{font-size:11px;font-weight:700;color:#333}
.item-desc{font-size:10px;color:#888;margin-top:2px}
/* FORM */
.f-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.f-item{display:flex;flex-direction:column;gap:4px}
label.fl{font-size:10px;color:#555;font-weight:700}
.req{color:#c62828}
input.fi,select.fi{width:100%;border:1px solid #d8dde6;border-radius:4px;padding:4px 8px;font-size:10px;height:28px;font-family:Arial;background:#fff}
input.fi:focus,select.fi:focus{outline:none;border-color:#0057b8}
/* INFO BOXES */
.info-box{background:#e8f0fe;border-left:3px solid #0057b8;padding:10px 14px;border-radius:0 4px 4px 0;font-size:10px;color:#1565c0;margin-bottom:14px;line-height:1.6}
.obs-box{background:#ffebee;border-left:3px solid #c62828;padding:10px 14px;border-radius:0 4px 4px 0;font-size:10px;color:#c62828;margin-bottom:14px;line-height:1.6}
.warn-box{background:#fff8e1;border-left:3px solid #f9a825;padding:10px 14px;border-radius:0 4px 4px 0;font-size:10px;color:#e65100;margin-bottom:14px;line-height:1.6}
/* SEARCH */
.search-box{display:flex;gap:6px;margin-bottom:14px}
.search-no-result{font-size:10px;color:#c62828;margin-top:6px;display:none}
.sel-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;min-height:28px}
/* OVERLAY */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:200}
.overlay.show{display:flex}
.modal{background:#fff;border-radius:6px;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.22);width:480px}
.modal.mw400{width:400px}.modal.mw560{width:560px}
.mh{background:linear-gradient(90deg,#0057b8,#1a9fd4);padding:11px 18px;color:#fff;font-size:12px;font-weight:700;display:flex;justify-content:space-between;align-items:center}
.mh-x{cursor:pointer;opacity:.75;font-size:16px;background:none;border:none;color:#fff}
.mb{padding:18px}
.mf{padding:10px 18px;border-top:1px solid #eee;display:flex;justify-content:flex-end;gap:8px;background:#fafafa}
.ok-icon{width:50px;height:50px;border-radius:50%;border:3px solid #1b5e20;display:flex;align-items:center;justify-content:center;margin:8px auto 12px;color:#1b5e20;font-size:22px;font-weight:700}
.f-hint{font-size:9px;color:#888;margin-top:3px;font-style:italic}
.footer{text-align:center;font-size:10px;color:#bbb;padding:14px}
</style>
</head>
<body>




<div class="main">

<div style="display:flex;gap:0;margin-bottom:14px;border-bottom:2px solid #e4e6ea">
  <button id="tab-gestao" onclick="nav('gestao')" style="padding:8px 18px;border:none;background:none;font-size:11px;font-weight:700;color:#0057b8;cursor:pointer;border-bottom:2px solid #0057b8;margin-bottom:-2px">Gestão</button>
  <button id="tab-exec" onclick="nav('exec')" style="padding:8px 18px;border:none;background:none;font-size:11px;font-weight:700;color:#aaa;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px">Executar Triagem</button>
</div>

  <!-- ══ GESTÃO ══ -->
  <div class="page active" id="page-gestao">
    <div class="bread">Home / Triagem de Devolução</div>
    <div class="page-title">GESTÃO DE TRIAGEM</div>

    <!-- SELEÇÃO DE BANCADA -->
    <div id="gestao-bancada-select">
      <div class="bancada-selector">
        <div class="icon">🏭</div>
        <h2>Selecione a Bancada de Triagem</h2>
        <p>Informe o código da bancada que deseja gerenciar</p>
        <div class="bancada-bipe">
          <input type="text" id="bancada-bipe-input" placeholder="Bipe ou digite o código da bancada" onkeydown="if(event.key==='Enter')selecionarBancadaBipe()"/>
          <button class="btn bb" onclick="selecionarBancadaBipe()">Confirmar</button>
        </div>
        <div class="bancada-erro" id="bancada-erro">Bancada não encontrada. Verifique o código e tente novamente.</div>
        <div class="bancada-lista" id="bancada-lista"></div>
      </div>
    </div>

    <!-- CONTEÚDO DA BANCADA -->
    <div id="gestao-bancada-content" style="display:none">
      <div class="bancada-hdr">
        <div>
          <div class="bancada-hdr-info" id="bancada-hdr-nome">BANC-01 — Bancada de Triagem 01</div>
          <div class="bancada-hdr-sub" id="bancada-hdr-sub">Operador: Alessandro Silveira</div>
        </div>
        <button class="btn bo btn-sm" onclick="trocarBancada()">⇄ Trocar bancada</button>
      </div>

      <div class="panel-grid">
        <div class="pc pc-1 active" id="pc-ag" onclick="filtrarGestao('aguardando')">
          <div class="n" id="cnt-ag">0</div><div class="l">Aguardando triagem</div>
        </div>
        <div class="pc pc-2" id="pc-tri" onclick="filtrarGestao('triagem')">
          <div class="n" id="cnt-tri">0</div><div class="l">Liberadas / Em triagem</div>
        </div>
      </div>

      <!-- CAIXAS -->
      <div class="card" id="card-caixas">
        <div class="sec">
          <span>Caixas da Bancada</span>
          <button class="btn bo btn-sm" onclick="openNovaCaixa(null,null)">+ Abrir nova caixa</button>
        </div>
        <div id="caixas-content"></div>
      </div>

      <!-- LISTAGEM NRs -->
      <div class="card">
        <div class="filters">
          <select id="g-status" onchange="onGStatus()" style="width:200px">
            <option value="aguardando">Aguardando triagem</option>
            <option value="triagem">Triagem</option>
          </select>
          <input type="text" id="g-pesq" placeholder="Nº NR ou NF" style="width:120px"/>
          <input type="date" id="g-dt-ini" style="width:110px"/>
          <input type="date" id="g-dt-fim" style="width:110px"/>
          <button class="btn bb" onclick="renderGestao()">🔍 Pesquisar</button>
          <button class="btn bo" onclick="limparFiltrosGestao()">Limpar</button>
        </div>
        <div class="sel-toolbar">
          <div style="font-size:10px;color:#888" id="g-sel-info"></div>
          <button class="btn bk btn-sm" id="btn-liberar-lote" style="display:none" onclick="openLiberar(null)">▶ Liberar selecionadas</button>
        </div>
        <div class="tbl-wrap">
          <table><thead><tr id="g-thead"></tr></thead><tbody id="g-tbody"></tbody></table>
        </div>
      </div>
      <div class="footer">2022 – 2026 © Wiser Log –</div>
    </div>
  </div>

  <!-- ══ EXECUTAR TRIAGEM ══ -->
  <div class="page" id="page-exec">
    <div class="bread" style="display:flex;align-items:center;gap:8px"><button class="btn bg btn-sm back-btn-tri" onclick="_goBackTri()" style="display:none">← Voltar</button><span>Home / Triagem de Devolução / Executar Triagem</span></div>
    <div class="page-title">EXECUTAR TRIAGEM</div>
    <div class="search-box">
      <input type="text" id="exec-pesq" placeholder="Pesquisar por NF, NR ou Nº Pedido" style="height:28px;font-size:11px"/>
      <button class="btn bb" onclick="pesquisarExec()">🔍</button>
    </div>
    <div class="search-no-result" id="exec-no-result">Não foi localizado nenhum registro com esse número.</div>
    <div id="exec-lista"></div>
    <div class="footer">2022 – 2026 © Wiser Log –</div>
  </div>

  <!-- ══ ITENS DA NF ══ -->
  <div class="page" id="page-itens">
    <div class="bread" style="display:flex;align-items:center;gap:8px"><button class="btn bg btn-sm back-btn-tri" onclick="_goBackTri()" style="display:none">← Voltar</button><span>Home / <a onclick="nav('exec')">Executar Triagem</a> / Itens da NF</span></div>
    <div class="page-title" id="itens-titulo">Itens da NF</div>
    <div id="itens-obs-div" style="display:none"></div>
    <div class="card">
      <div class="sec"><span>Selecione o produto para triar</span></div>
      <div id="itens-lista"></div>
    </div>
    <button class="btn bg" onclick="nav('exec')">← Voltar</button>
    <div class="footer">2022 – 2026 © Wiser Log –</div>
  </div>

  <!-- ══ TRIAGEM DO ITEM ══ -->
  <div class="page" id="page-triagem-item">
    <div class="bread" style="display:flex;align-items:center;gap:8px"><button class="btn bg btn-sm back-btn-tri" onclick="_goBackTri()" style="display:none">← Voltar</button><span>Home / <a onclick="nav('exec')">Executar Triagem</a> / <a onclick="voltarItens()">Itens da NF</a> / Triar Produto</span></div>
    <div class="page-title" id="ti-titulo">Triagem do Produto</div>
    <div class="card" style="background:#f0f7ff;border:1px solid #b8d0f0;padding:12px 16px;margin-bottom:12px">
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;font-size:10px">
        <div><span style="color:#888">NR</span><div style="font-weight:700;margin-top:2px" id="ti-nr">—</div></div>
        <div><span style="color:#888">NF</span><div style="font-weight:700;margin-top:2px" id="ti-nf">—</div></div>
        <div><span style="color:#888">Cliente</span><div style="font-weight:700;margin-top:2px" id="ti-cliente">—</div></div>
        <div><span style="color:#888">Bancada</span><div style="font-weight:700;margin-top:2px" id="ti-end">—</div></div>
      </div>
    </div>
    <div class="card">
      <div class="sec"><span id="ti-prod-titulo">Produto</span></div>
      <div style="font-size:10px;color:#888;margin-bottom:14px">Qtde. esperada: <strong id="ti-qtd-esp">—</strong></div>
      <div class="f-grid">
        <div class="f-item">
          <label class="fl">Quantidade triada <span class="req">*</span></label>
          <input class="fi" type="number" id="ti-qtd" placeholder="Informe a quantidade" min="1"/>
        </div>
        <div class="f-item">
          <label class="fl">Status de Estoque <span class="req">*</span></label>
          <select class="fi" id="ti-status-estoque" onchange="onStatusEstoque()">
            <option value="">Selecione o status</option>
            <option value="bom">Produto bom</option>
            <option value="avariado">Avariado</option>
            <option value="vencido">Vencido</option>
            <option value="destruicao">Destruição</option>
          </select>
        </div>
        <div class="f-item" id="ti-caixa-field">
          <label class="fl">Caixa de destino</label>
          <div style="font-size:10px;padding:5px 8px;background:#f5f5f5;border:1px solid #e0e0e0;border-radius:4px;color:#555;min-height:28px;display:flex;align-items:center" id="ti-caixa-info">Selecione o status de estoque</div>
        </div>
        <div class="f-item" id="ti-lote-field" style="display:none">
          <label class="fl">Lote</label>
          <input class="fi" type="text" id="ti-lote" placeholder="Número do lote"/>
        </div>
        <div class="f-item" id="ti-val-field" style="display:none">
          <label class="fl">Data de Validade</label>
          <input class="fi" type="date" id="ti-val"/>
        </div>
        <div class="f-item" id="ti-fab-field" style="display:none">
          <label class="fl">Data de Fabricação</label>
          <input class="fi" type="date" id="ti-fab"/>
        </div>
        <div class="f-item" id="ti-serie-field" style="display:none">
          <label class="fl">Número de Série <span class="req">*</span></label>
          <input class="fi" type="text" id="ti-serie" placeholder="Informe o número de série"/>
        </div>
      </div>
      <div style="display:flex;justify-content:flex-end;gap:8px;padding-top:12px;border-top:1px solid #eee">
        <button class="btn bg" onclick="cancelarItem()">✕ Cancelar</button>
        <button class="btn bk" onclick="salvarItem()">✓ Confirmar triagem do produto</button>
      </div>
    </div>
    <div class="footer">2022 – 2026 © Wiser Log –</div>
  </div>

</div><!-- /main -->

<!-- MODAL SELECIONAR BANCADA (múltiplas) -->
<div class="overlay" id="modal-bancada"></div>

<!-- MODAL CONFIRMAR LIBERAÇÃO -->
<div class="overlay" id="modal-conf-lib">
  <div class="modal mw400">
    <div class="mh">Confirmar Liberação para Triagem</div>
    <div class="mb" style="padding:20px 18px">
      <div style="display:flex;align-items:flex-start;gap:14px">
        <div style="width:40px;height:40px;border-radius:50%;background:#e8f0fe;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">▶</div>
        <div>
          <div style="font-size:12px;font-weight:700;color:#0057b8;margin-bottom:8px" id="conf-lib-titulo">Liberar para triagem</div>
          <div style="font-size:11px;color:#444;line-height:1.7" id="conf-lib-lista"></div>
          <div style="font-size:10px;color:#888;margin-top:10px">Esta ação pode ser cancelada enquanto a triagem não for iniciada.</div>
        </div>
      </div>
    </div>
    <div class="mf" style="justify-content:center;gap:10px">
      <button class="btn bg" onclick="closeM('modal-conf-lib')">Não, voltar</button>
      <button class="btn bk" onclick="confirmarLib()">Sim, liberar</button>
    </div>
  </div>
</div>

<!-- MODAL CANCELAR LIBERAÇÃO -->
<div class="overlay" id="modal-cancel-lib">
  <div class="modal mw400">
    <div class="mh">Cancelar Liberação</div>
    <div class="mb" style="text-align:center;padding:22px">
      <div style="font-size:28px;margin-bottom:10px">⚠</div>
      <div style="font-size:12px;font-weight:700;color:#333;margin-bottom:8px">Cancelar liberação para triagem?</div>
      <p style="font-size:11px;color:#666;line-height:1.7">A NR retornará ao status "Aguardando triagem".</p>
    </div>
    <div class="mf" style="justify-content:center;gap:10px">
      <button class="btn bg" onclick="closeM('modal-cancel-lib')">Não, manter</button>
      <button class="btn br" onclick="confirmarCancelLib()">Sim, cancelar</button>
    </div>
  </div>
</div>

<!-- MODAL NOVA CAIXA -->
<div class="overlay" id="modal-nova-caixa">
  <div class="modal mw400">
    <div class="mh">Abrir Nova Caixa de Triagem <button class="mh-x" onclick="closeM('modal-nova-caixa')">✕</button></div>
    <div class="mb">
      <div class="info-box" id="nova-caixa-info-box" style="display:none"></div>
      <div class="f-item" style="margin-bottom:14px">
        <label class="fl">Bipe ou informe o endereço da caixa <span class="req">*</span></label>
        <div style="display:flex;gap:6px">
          <input type="text" id="nova-caixa-end-bipe" class="fi" style="height:28px;flex:1" placeholder="Código de barras ou endereço" onkeydown="if(event.key==='Enter')validarEndCaixa()"/>
          <button class="btn bb btn-sm" onclick="validarEndCaixa()">OK</button>
        </div>
        <div class="f-hint">Apenas endereços do tipo "Caixa Triagem" ativos</div>
        <div style="font-size:10px;color:#c62828;margin-top:4px;display:none" id="nova-caixa-end-erro">Endereço não encontrado ou não é do tipo Caixa Triagem.</div>
      </div>
      <div class="f-item" id="nova-caixa-status-wrap" style="display:none">
        <label class="fl">Status de Estoque <span class="req">*</span></label>
        <select class="fi" id="nova-caixa-status" style="margin-top:4px">
          <option value="">Selecione o status de estoque</option>
          <option value="bom">Produto bom</option>
          <option value="avariado">Avariado</option>
          <option value="vencido">Vencido</option>
          <option value="destruicao">Destruição</option>
        </select>
        <div class="f-hint">Cada bancada permite apenas 1 caixa ativa por status de estoque</div>
        <div style="font-size:10px;color:#c62828;margin-top:4px;display:none" id="nova-caixa-status-erro"></div>
      </div>
    </div>
    <div class="mf">
      <button class="btn bg" onclick="closeM('modal-nova-caixa')">Cancelar</button>
      <button class="btn bk" onclick="confirmarNovaCaixa()">Abrir Caixa</button>
    </div>
  </div>
</div>

<!-- MODAL VER CAIXA -->
<div class="overlay" id="modal-ver-caixa">
  <div class="modal mw560">
    <div class="mh" id="ver-caixa-titulo">Caixa ET-001 <button class="mh-x" onclick="closeM('modal-ver-caixa')">✕</button></div>
    <div class="mb" style="padding:14px">
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Produto</th><th>Descrição</th><th>Qtde</th><th>NF</th><th>Data/Hora</th></tr></thead>
          <tbody id="ver-caixa-tbody"></tbody>
        </table>
      </div>
      <div style="font-size:10px;color:#aaa;font-style:italic;text-align:center;padding:12px;display:none" id="ver-caixa-empty">Nenhum produto alocado nesta caixa.</div>
    </div>
    <div class="mf"><button class="btn bg" onclick="closeM('modal-ver-caixa')">Fechar</button></div>
  </div>
</div>

<!-- MODAL FECHAR CAIXA -->
<div class="overlay" id="modal-fechar-caixa">
  <div class="modal mw400">
    <div class="mh">Fechar Caixa</div>
    <div class="mb" style="padding:18px">
      <div style="text-align:center;margin-bottom:14px">
        <div style="font-size:28px;margin-bottom:6px">🔒</div>
        <div style="font-size:12px;font-weight:700;color:#333;margin-bottom:6px" id="fechar-caixa-titulo">Fechar caixa?</div>
      </div>
      <div style="background:#f8f9fa;border:1px solid #e4e6ea;border-radius:4px;padding:10px;font-size:10px;margin-bottom:12px" id="fechar-caixa-resumo"></div>
      <!-- Alerta divergência -->
      <div class="warn-box" id="fechar-div-alert" style="display:none">
        ⚠ <strong>Divergência de quantidade identificada.</strong><br>
        Um ou mais produtos foram triados com quantidade diferente da esperada.<br>
        É necessário autorização de um usuário avançado para fechar esta caixa.
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px">

/* ══ NAVEGAÇÃO ══ */
var _navHistTri=[];
var _navHistTri=[];
function nav(p){
  var cur=document.querySelector('.page.active');
  if(cur&&cur.id&&cur.id!=='page-'+p)_navHistTri.push(cur.id.replace('page-',''));
  document.querySelectorAll('.page').forEach(function(x){x.classList.remove('active');});
  document.getElementById('page-'+p).classList.add('active');
  if(p==='gestao'){initGestao();}
  if(p==='exec'){renderExec();}
  _updateBackBtnTri();
  var tG=document.getElementById('tab-gestao');
  var tE=document.getElementById('tab-exec');
  if(tG){tG.style.color=p==='gestao'?'#0057b8':'#aaa';tG.style.borderBottomColor=p==='gestao'?'#0057b8':'transparent';}
  if(tE){tE.style.color=(p==='exec'||p==='itens'||p==='triagem-item')?'#0057b8':'#aaa';tE.style.borderBottomColor=(p==='exec'||p==='itens'||p==='triagem-item')?'#0057b8':'transparent';}
}
function _goBackTri(){
  if(_navHistTri.length===0)return;
  var prev=_navHistTri.pop();
  document.querySelectorAll('.page').forEach(function(x){x.classList.remove('active');});
  document.getElementById('page-'+prev).classList.add('active');
  if(prev==='gestao')initGestao();
  if(prev==='exec')renderExec();
  _updateBackBtnTri();
}
function _updateBackBtnTri(){
  document.querySelectorAll('.back-btn-tri').forEach(function(b){
    b.style.display=_navHistTri.length>0?'inline-flex':'none';
